name: Test Matrix UI

on:
  workflow_dispatch:

jobs:
  matrix-job:
    name: Playwright tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]

    steps:
      - name: Show shard
        run: |
          echo "Running shard ${{ matrix.shard }}"
          sleep 15